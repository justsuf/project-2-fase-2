<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactieve Schoolplaat</title>
  <link rel="stylesheet" href="../schoolplaat js/css/schoolplaat.css">
</head>
<body>

<div id="plaat-wrapper">
  <div id="plaat-container">
    
    <img id="plaat-img" src="grafheuvels.jpg" />

    <div class="vergrootglas" style="top: 40%; left: 30%;" data-info="Info hier">🔍</div>
    <div class="vergrootglas" style="top: 60%; left: 70%;" data-info="Nog meer info">🔍</div>

  </div>
</div>

<div id="popup" class="popup">
  <div id="popup-close" class="popup-close">X</div>
  <div id="popup-content"></div>
</div>

<div class="popup" id="popup">
  <span class="popup-close" id="popup-close">✖</span>
  <div id="popup-content"></div>
</div>

<script src="../schoolplaat js/css/schoolplaat.js"></script>
</body>
</html>
